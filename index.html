<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ABPS Lead Capture</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --brand: #0056b3; --accent: #00a878; --bg: #f0f4f8; --card: #ffffff; --border: #d0d9e4; --text: #1a2332; --radius: 12px; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
  header { background: var(--brand); color: #fff; padding: 20px; text-align: center; }
  .section { background: var(--card); border-radius: var(--radius); margin: 16px 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 16px; }
  .section-header { font-weight: 700; text-transform: uppercase; margin-bottom: 15px; color: var(--brand); font-size: 0.9rem; }
  label.field-label { display: block; font-size: .75rem; font-weight: 600; color: #666; margin: 14px 0 6px; text-transform: uppercase; }
  input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill-group input { display: none; }
  .pill-group label { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: .8rem; cursor: pointer; background: #fff; }
  .pill-group input:checked + label { background: var(--brand); color: #fff; border-color: var(--brand); }
  .other-input { margin-top: 8px; display: none; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .btn-ai { background: var(--accent); color: #fff; }
  .btn-sub { background: var(--brand); color: #fff; }
  #techSummary { color: red; font-weight: 500; }
</style>
</head>
<body>

<header><h1>ABPS Lead App</h1></header>

<div id="success-screen" style="display:none; text-align:center; padding:50px;">
  <div style="font-size:4rem;">✅</div>
  <h2>Submitted!</h2>
  <p id="success-ref" style="font-weight:bold; color:var(--brand);"></p>
  <button class="btn btn-sub" onclick="location.reload()">➕ Add New Lead</button>
</div>

<div id="main-form">
  <div class="section">
    <div class="section-header">Section 1 — Business Card(s)</div>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <div onclick="document.getElementById('card-front').click()" style="flex:1; border:2px dashed #ccc; padding:15px; text-align:center; font-size: 0.8rem;" id="front-status">Front Side</div>
      <div onclick="document.getElementById('card-back').click()" style="flex:1; border:2px dashed #ccc; padding:15px; text-align:center; font-size: 0.8rem;" id="back-status">Back Side (Opt)</div>
    </div>
    <input type="file" id="card-front" accept="image/*" capture="environment" hidden />
    <input type="file" id="card-back" accept="image/*" capture="environment" hidden />
    <button class="btn btn-ai" id="parse-btn" onclick="parseCard()" disabled>✨ Parse Card(s)</button>
    
    <label class="field-label">Name</label><input type="text" id="f-name">
    <label class="field-label">Company</label><input type="text" id="f-company">
    <label class="field-label">Phone</label><input type="text" id="f-phone">
    <label class="field-label">Alt Phone</label><input type="text" id="f-altphone">
    <label class="field-label">Email</label><input type="text" id="f-email">
    <label class="field-label">Website</label><input type="text" id="f-website">
    <label class="field-label">Address</label><textarea id="f-address"></textarea>
  </div>

  <div class="section">
    <div class="section-header">Section 2 — Meeting Details</div>
    <label class="field-label">Date of Meeting</label><input type="date" id="m-date">
    <label class="field-label">Time of Meeting</label><input type="time" id="m-time">
    <label class="field-label">ABPS Business Vertical</label>
    <div class="pill-group">
      <input type="radio" name="bv" value="Industrial" id="bv1" onchange="toggleOtherText(this, 'bvOther')"><label for="bv1">Industrial</label>
      <input type="radio" name="bv" value="Power" id="bv2" onchange="toggleOtherText(this, 'bvOther')"><label for="bv2">Power</label>
      <input type="radio" name="bv" value="Renewable" id="bv3" onchange="toggleOtherText(this, 'bvOther')"><label for="bv3">Renewable</label>
      <input type="radio" name="bv" value="Other" id="bv4" onchange="toggleOtherText(this, 'bvOther')"><label for="bv4">Other</label>
    </div>
    <input type="text" id="bvOther" class="other-input" placeholder="Specify Vertical...">
  </div>

  <div class="section">
    <div class="section-header">Section 4 — Area of Concerns</div>
    <label class="field-label">Voltage Level (Multi)</label>
    <div class="pill-group">
      <input type="checkbox" name="vl" value="440V" id="v1"><label for="v1">440V</label>
      <input type="checkbox" name="vl" value="660V" id="v2"><label for="v2">660V</label>
      <input type="checkbox" name="vl" value="3.3KV" id="v3"><label for="v3">3.3KV</label>
      <input type="checkbox" name="vl" value="11KV" id="v4"><label for="v4">11KV</label>
      <input type="checkbox" name="vl" value="33KV" id="v5"><label for="v5">33KV</label>
    </div>
    <label class="field-label">Technical Discussion Summary</label>
    <textarea id="techSummary" placeholder="Summary will appear in Red..."></textarea>
  </div>

  <div class="section">
    <div class="section-header">Section 5 — Products Discussed</div>
    <div class="pill-group">
      <input type="checkbox" name="prod" value="APFC" id="p1"><label for="p1">APFC</label>
      <input type="checkbox" name="prod" value="RTPFC" id="p2"><label for="p2">RTPFC</label>
      <input type="checkbox" name="prod" value="Harmonic Filter" id="p3"><label for="p3">Filter</label>
      <input type="checkbox" name="prod" value="SVG" id="p4"><label for="p4">SVG</label>
      <input type="checkbox" name="prod" value="MV Capacitor Bank" id="p5"><label for="p5">MV Cap</label>
      <input type="checkbox" name="prod" value="Reactor" id="p6"><label for="p6">Reactor</label>
      <input type="checkbox" name="prod" value="Others" id="p7" onchange="toggleOtherCheck(this, 'prodOther')"><label for="p7">Others</label>
    </div>
    <input type="text" id="prodOther" class="other-input" placeholder="Specify Products...">
  </div>

  <div class="section">
    <div class="section-header">Section 6 — Action Plan</div>
    <label class="field-label">Send Company Profile</label><select id="a1"><option>No</option><option>Yes</option></select>
    <label class="field-label">Send Technical Presentation</label><select id="a2"><option>No</option><option>Yes</option></select>
    <label class="field-label">Arrange Site Visit</label><select id="a3"><option>No</option><option>Yes</option></select>
    <label class="field-label">Get Enquiry</label><select id="a4"><option>No</option><option>Yes</option></select>
    <label class="field-label">Send Budgetary Offer</label><select id="a5"><option>No</option><option>Yes</option></select>
    <label class="field-label">Send Techno-Commercial Offer</label><select id="a6"><option>No</option><option>Yes</option></select>
    <label class="field-label">Follow-Up Required</label><select id="a7"><option>No</option><option>Yes</option></select>
    <label class="field-label">Next Follow-Up Date</label><input type="date" id="nextDate">
  </div>

  <div class="section">
    <div class="section-header">Section 7 — Engineer Info</div>
    <select id="engName">
      <option>Mohammad Asraf</option><option>Alok Kumar</option><option>Aritra Roy</option>
      <option>Debarshi Mukharjee</option><option>Pavan</option>
    </select>
  </div>

  <div style="padding: 12px;"><button class="btn btn-sub" id="sub-btn" onclick="submitLead()">📤 Submit Lead</button></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzdKWMiffVHYUCl2PoIyeiupmbL79SXVdQ-5yByvqi0VyCCf1X50Vb5uUrUUX9Mhfz2CQ/exec";
const CLOUD_NAME = "dcdhahrhz";
const UPLOAD_PRESET = "ABPS Leads Form";

let fileFront = null, fileBack = null;

document.getElementById('card-front').onchange = (e) => { fileFront = e.target.files[0]; document.getElementById('front-status').innerHTML = "Front ✅"; document.getElementById('parse-btn').disabled = false; };
document.getElementById('card-back').onchange = (e) => { fileBack = e.target.files[0]; document.getElementById('back-status').innerHTML = "Back ✅"; };

function toggleOtherText(r, id) { document.getElementById(id).style.display = (r.value === 'Other') ? 'block' : 'none'; }
function toggleOtherCheck(c, id) { document.getElementById(id).style.display = c.checked ? 'block' : 'none'; }

async function parseCard() {
  const btn = document.getElementById('parse-btn'); btn.innerText = "Parsing...";
  const getBase64 = (file) => new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(file); });
  
  const img1 = await getBase64(fileFront);
  const img2 = fileBack ? await getBase64(fileBack) : null;

  const r = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'parse', image:img1, imageBack:img2 }) });
  const j = await r.json();
  if(j.candidates) {
    const d = JSON.parse(j.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
    document.getElementById('f-name').value = d.name || "";
    document.getElementById('f-company').value = d.company || "";
    document.getElementById('f-phone').value = d.phone || "";
    document.getElementById('f-altphone').value = d.altPhone || "";
    document.getElementById('f-email').value = d.email || "";
    document.getElementById('f-address').value = d.address || "";
  }
  btn.innerText = "✨ Parse Card(s)";
}

async function submitLead() {
  const btn = document.getElementById('sub-btn'); btn.disabled = true; btn.innerText = "Saving...";
  const upload = async (f) => { if(!f) return ""; const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', UPLOAD_PRESET); const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:fd}); const d = await res.json(); return d.secure_url; };
  
  const url1 = await upload(fileFront);
  const url2 = await upload(fileBack);
  const urls = [url1, url2].filter(u => u).join(", ");

  const getChecks = n => Array.from(document.querySelectorAll(`input[name="${n}"]:checked`)).map(c => c.value);
  const getRadio = n => (document.querySelector(`input[name="${n}"]:checked`) || {}).value || "";

  const fields = {
    engineerName: document.getElementById('engName').value,
    name: document.getElementById('f-name').value,
    company: document.getElementById('f-company').value,
    phone: document.getElementById('f-phone').value,
    altPhone: document.getElementById('f-altphone').value,
    email: document.getElementById('f-email').value,
    address: document.getElementById('f-address').value,
    meetingDate: document.getElementById('m-date').value,
    meetingTime: document.getElementById('m-time').value,
    businessVertical: getRadio('bv') === 'Other' ? document.getElementById('bvOther').value : getRadio('bv'),
    voltage: getChecks('vl'),
    techSummary: document.getElementById('techSummary').value,
    products: [...getChecks('prod').filter(p => p !== 'Others'), document.getElementById('prodOther').value].filter(v => v),
    sendProfile: document.getElementById('a1').value,
    sendPresentation: document.getElementById('a2').value,
    arrangeVisit: document.getElementById('a3').value,
    getEnquiry: document.getElementById('a4').value,
    sendBudgetary: document.getElementById('a5').value,
    sendTechno: document.getElementById('a6').value,
    followUpRequired: document.getElementById('a7').value,
    nextDate: document.getElementById('nextDate').value
  };

  const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'submit', fields, imageUrl: urls }) });
  const j = await res.json();
  if(j.success) {
    document.getElementById('main-form').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('success-ref').innerText = "Lead ID: " + j.leadRef;
  }
}
</script>
</body>
</html>
