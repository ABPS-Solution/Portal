<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ABPS Complete Bypass Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1a2332; padding: 20px; }
  
  #auth-container { max-width: 400px; margin: 100px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  h2 { margin-bottom: 16px; color: #003d82; text-align: center; }
  
  label { display: block; font-size: .75rem; font-weight: 600; color: #6b7a8d; text-transform: uppercase; margin: 14px 0 4px; }
  input { width: 100%; padding: 10px; border: 1.5px solid #d0d9e4; border-radius: 8px; font-size: .9rem; background: #fff; color: #1a2332; margin-bottom: 10px; }
  
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 1rem; background: #0056b3; color: #fff; }
  
  #app-portal { display: none; max-width: 600px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div id="auth-container">
  <h2>ABPS Gateway System</h2>
  
  <form id="bypass-form" action="https://script.google.com/macros/s/AKfycbygnmkPzgE3qyhmjvRYQJlWBdFldTvg676sewbII3BhZcZk-nE5PM1oeMniLlb7X88okw/exec" method="POST" target="hidden-response-iframe">
    
    <input type="hidden" name="action" value="login" />
    
    <label>Username</label>
    <input type="text" name="username" id="auth-user" required placeholder="demo.engineer" />
    
    <label>Password</label>
    <input type="password" name="password" id="auth-pass" required placeholder="••••••••" />
    
    <button type="submit" class="btn" id="login-btn" onclick="startLoadingIndicator()">Sign In</button>
  </form>
</div>

<div id="app-portal">
  <h1 style="color: #00a878; margin-bottom: 10px;">🎉 Access Granted!</h1>
  <p style="color: #6b7a8d; margin-bottom: 20px;">You have successfully bypassed the browser's cross-origin security wall.</p>
  <button class="btn" style="background: #e84545; width: auto; padding: 8px 16px;" onclick="location.reload()">Sign Out</button>
</div>

<iframe name="hidden-response-iframe" id="hidden-response-iframe" style="display:none;"></iframe>

<script>
function startLoadingIndicator() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  if(!u || !p) return;
  
  document.getElementById('login-btn').textContent = "Establishing Connection...";
}

// Listen for the hidden iframe to load Google's response back to us
document.getElementById('hidden-response-iframe').onload = function() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  
  // Prevent tracking checks from firing on initial page boot load routines
  if(!u || !p) return;

  console.log("Form request returned. Checking bypass parameters...");
  
  // Since we hardcoded the login inside the script, any successful submission clears the login window
  if (u === "demo.engineer" && p === "ABPS@demo2026") {
    document.getElementById('auth-container').style.display = 'none';
    document.getElementById('app-portal').style.display = 'block';
  } else {
    alert("Authentication Refused: Invalid credentials entered.");
    document.getElementById('login-btn').textContent = "Sign In";
  }
};
</script>
</body>
</html>
